services:
  # Backend Service
  - type: web
    name: symposium-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: # Will be set automatically when linked to database
      - key: DB_USER
        value: # Will be set automatically when linked to database
      - key: DB_PASSWORD
        value: # Will be set automatically when linked to database
      - key: DB_NAME
        value: symposium_management
      - key: DB_PORT
        value: 3306

  # Frontend Service
  - type: web
    name: symposium-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://symposium-backend.onrender.com

# Database Service
databases:
  - name: symposium-db
    databaseName: symposium_management
    user: symposium_user
